<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="pG Plan">
<link rel="manifest" href="./manifest.json">
<title>pG Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#28283a;
  --text:#f0f0f8;--muted:#5a5a72;--accent:#6c5ce7;--teal:#00cec9;
  --danger:#e17055;--green:#00b894;--rs:10px;
  /* Moderne User-Farben */
  --c0:#6c5ce7;--c1:#00cec9;--c2:#fd79a8;--c3:#fdcb6e;
  --c4:#55efc4;--c5:#74b9ff;--c6:#a29bfe;--c7:#fab1a0;
  --c8:#00b894;--c9:#e84393;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login-screen{min-height:100vh;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,#1a1040,#0a0a0f 60%);padding:16px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px 28px 36px;width:360px;max-width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.login-logo{margin-bottom:6px}
.login-logo img{height:44px;filter:invert(1)}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:26px}
.step-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
#step-name{display:block}
.finput-lg{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:13px 14px;outline:none;transition:border-color .2s;margin-bottom:12px;text-align:center}
.finput-lg:focus{border-color:var(--accent)}
.finput-lg::placeholder{color:var(--muted)}
.btn-next{width:100%;background:linear-gradient(135deg,var(--accent),#a29bfe);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;letter-spacing:.3px}
.btn-next:hover{opacity:.9;transform:translateY(-1px)}
.btn-next:active{transform:scale(.98)}
#step-pin{display:none}
.back-btn{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:16px;padding:0}
.back-btn:hover{color:var(--text)}
.user-greeting{background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;margin-bottom:20px;text-align:left;display:flex;align-items:center;gap:12px}
.greeting-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.greeting-text{}
.greeting-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.greeting-name{font-size:16px;font-weight:600}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:22px}
.pin-dot{width:13px;height:13px;border-radius:50%;background:var(--border);transition:all .2s}
.pin-dot.filled{background:var(--accent);transform:scale(1.2)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
.pin-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:20px;padding:16px;border-radius:12px;cursor:pointer;transition:all .15s;user-select:none}
.pin-btn:active{transform:scale(.92);background:var(--accent);color:#fff;border-color:var(--accent)}
.pin-error{font-size:13px;color:var(--danger);min-height:22px;margin-top:6px}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-logo img{height:26px;filter:invert(1)}
.topbar-right{display:flex;align-items:center;gap:8px}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 13px 5px 5px;font-size:13px;font-weight:500}
.udot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.admin-tag{font-size:10px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a29bfe);color:#fff;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.logout-btn{background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:5px 8px;border-radius:6px}
.logout-btn:hover{color:var(--danger)}
.btn{padding:8px 14px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#a29bfe);color:#fff}.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.view-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;gap:8px;flex-wrap:wrap}
.toggle-group{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;padding:3px;gap:3px}
.toggle-btn{padding:6px 14px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border-radius:7px}
.toggle-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.4)}
.nav-arrows{display:flex;gap:6px;align-items:center}
.nav-label{font-size:13px;font-weight:600;min-width:150px;text-align:center}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:3px 10px 3px 6px;border-radius:20px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cal-wrap{padding:0 18px 32px;flex:1}

/* MONTH */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mh{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:center;padding:7px 0}
.mday{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);min-height:80px;padding:6px;cursor:pointer;transition:all .15s}
.mday:hover{border-color:var(--accent);background:var(--surface2)}
.mday.other{opacity:.25}.mday.today{border-color:var(--teal);background:rgba(0,206,201,.05)}
.dnum{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px}
.mday.today .dnum{color:var(--teal)}
.dchips{display:flex;flex-direction:column;gap:2px}
.chip{font-size:9px;padding:2px 5px;border-radius:4px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;letter-spacing:.2px}

/* WEEK */
.week-grid{display:grid;grid-template-columns:40px repeat(7,1fr);gap:3px}
.wdh{text-align:center;padding:7px 2px}
.wdh .wdn{color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:700;letter-spacing:.5px}
.wdh .wdd{font-size:16px;font-weight:700;margin-top:2px}
.wdh.today .wdd{color:var(--teal)}
.timecol{display:flex;flex-direction:column}
.tslot{height:56px;display:flex;align-items:flex-start;padding-top:2px}
.tlabel{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.wcol{position:relative;border-left:1px solid var(--border)}
.whl{height:56px;border-bottom:1px solid #1a1a28}
.wev{position:absolute;left:2px;right:2px;border-radius:6px;padding:4px 6px;font-size:10px;color:#fff;font-weight:600;overflow:hidden;cursor:pointer;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.wev:hover{opacity:.85;transform:scaleX(.98)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px 22px 40px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal-overlay{align-items:center}.modal{border-radius:20px}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.mtitle{font-size:18px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:14px}
.flabel{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.finput,.ftextarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 13px;outline:none;transition:border-color .2s}
.finput:focus,.ftextarea:focus{border-color:var(--accent)}
.ftextarea{resize:vertical;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.pchecks{display:flex;flex-wrap:wrap;gap:7px}
.pcheck{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:7px 13px;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;user-select:none}
.pcheck.sel{border-color:var(--accent);background:rgba(108,92,231,.18)}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mactions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;flex-wrap:wrap}

/* DETAIL */
.dheader{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.dtitle{font-size:19px;font-weight:700}
.dtime{font-size:13px;color:var(--teal);margin-top:4px;font-family:'DM Mono',monospace;font-weight:500}
.dsec{margin-bottom:16px}
.dsec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dsec-val{font-size:14px;line-height:1.7}
.apills{display:flex;flex-wrap:wrap;gap:7px}
.apill{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;background:var(--surface2);border:1px solid var(--border)}
.cal-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:rgba(0,206,201,.1);border:1.5px solid var(--teal);color:var(--teal);border-radius:var(--rs);padding:12px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;transition:all .15s}
.cal-btn:hover{background:rgba(0,206,201,.18)}
.cal-btn:active{transform:scale(.98)}

/* ADMIN */
.admin-panel{padding:0 18px 32px}
.ptitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:8px}
.plist{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.prow{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px}
.prow-l{display:flex;align-items:center;gap:12px}
.pswatch{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.pname{font-size:14px;font-weight:600}
.ppin{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.copt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0;position:relative}
.copt.sel{border-color:#fff;transform:scale(1.15)}
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:11px 24px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">Verbinde...</div>
</div>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img id="login-logo" alt="pG"></div>
    <div class="login-sub">Team-Kalender</div>
    <div id="step-name">
      <div class="step-title">Dein Name</div>
      <input class="finput-lg" id="name-input" type="text" placeholder="Vor- und Nachname" autocomplete="name" autocorrect="off" spellcheck="false">
      <button class="btn-next" onclick="goToPin()">Weiter →</button>
      <div class="pin-error" id="name-error"></div>
    </div>
    <div id="step-pin">
      <button class="back-btn" onclick="goBackToName()">← Zurück</button>
      <div class="user-greeting" id="user-greeting">
        <div class="greeting-avatar" id="greeting-avatar">?</div>
        <div class="greeting-text">
          <div class="greeting-label">Willkommen</div>
          <div class="greeting-name" id="greeting-name">—</div>
        </div>
      </div>
      <div class="pin-dots">
        <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
      </div>
      <div class="pin-grid">
        <button class="pin-btn" onclick="pinPress('1')">1</button>
        <button class="pin-btn" onclick="pinPress('2')">2</button>
        <button class="pin-btn" onclick="pinPress('3')">3</button>
        <button class="pin-btn" onclick="pinPress('4')">4</button>
        <button class="pin-btn" onclick="pinPress('5')">5</button>
        <button class="pin-btn" onclick="pinPress('6')">6</button>
        <button class="pin-btn" onclick="pinPress('7')">7</button>
        <button class="pin-btn" onclick="pinPress('8')">8</button>
        <button class="pin-btn" onclick="pinPress('9')">9</button>
        <button class="pin-btn" style="font-size:14px" onclick="pinClear()">↩</button>
        <button class="pin-btn" onclick="pinPress('0')">0</button>
        <button class="pin-btn" style="font-size:16px" onclick="pinDelete()">⌫</button>
      </div>
      <div class="pin-error" id="pin-error"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo"><img id="app-logo" alt="pG"></div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="udot" id="user-dot">?</div>
        <span id="user-name-label">—</span>
        <span class="admin-tag" id="admin-tag" style="display:none">Admin</span>
      </div>
      <button class="logout-btn" onclick="logout()">✕</button>
    </div>
  </div>
  <div class="view-bar">
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-month" onclick="setView('month')">Monat</button>
      <button class="toggle-btn" id="btn-week" onclick="setView('week')">Woche</button>
      <button class="toggle-btn" id="btn-admin" onclick="setView('admin')" style="display:none">⚙ Team</button>
    </div>
    <div class="nav-arrows" id="nav-arrows">
      <button class="btn btn-ghost btn-sm" onclick="navPrev()">‹</button>
      <span class="nav-label" id="nav-label">—</span>
      <button class="btn btn-ghost btn-sm" onclick="navNext()">›</button>
    </div>
    <button class="btn btn-primary btn-sm" id="add-btn" style="display:none" onclick="openAddModal()">+ Auftrag</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="cal-wrap" id="cal-wrap"></div>
  <div class="admin-panel" id="admin-panel" style="display:none"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="modal-title">Neuer Auftrag</div>
    <div class="fg"><label class="flabel">Titel</label><input class="finput" id="f-title" placeholder="z.B. Baustelle Hauptstraße"></div>
    <div class="fg"><label class="flabel">Datum</label><input class="finput" id="f-date" type="date"></div>
    <div class="frow">
      <div class="fg"><label class="flabel">Von (Uhrzeit)</label><input class="finput" id="f-time-start" type="time"></div>
      <div class="fg"><label class="flabel">Bis (Uhrzeit)</label><input class="finput" id="f-time-end" type="time"></div>
    </div>
    <div class="fg"><label class="flabel">Adresse</label><input class="finput" id="f-address" placeholder="Straße, Ort"></div>
    <div class="fg"><label class="flabel">Hinweise</label><textarea class="ftextarea" id="f-notes" placeholder="Was ist zu tun?"></textarea></div>
    <div class="fg"><label class="flabel">Personen zuweisen</label><div class="pchecks" id="pchecks"></div></div>
    <div class="mactions">
      <button class="btn btn-ghost" onclick="closeModal('add-modal')">Abbrechen</button>
      <button class="btn btn-danger btn-sm" id="delete-btn" style="display:none" onclick="deleteOrder()">Löschen</button>
      <button class="btn btn-primary" onclick="saveOrder()">Speichern</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="dheader">
      <div>
        <div class="dtitle" id="d-title">—</div>
        <div class="dtime" id="d-time">—</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div class="dsec" id="d-addr-sec"><div class="dsec-label">📍 Adresse</div><div class="dsec-val" id="d-addr">—</div></div>
    <div class="dsec" id="d-notes-sec"><div class="dsec-label">📋 Hinweise</div><div class="dsec-val" id="d-notes" style="white-space:pre-line">—</div></div>
    <div class="dsec"><div class="dsec-label">👤 Zugewiesen an</div><div class="apills" id="d-pills"></div></div>
    <button class="cal-btn" onclick="exportToCalendar()">📅 In Handykalender speichern</button>
    <div class="mactions" id="d-admin-act" style="display:none">
      <button class="btn btn-ghost" onclick="closeModal('detail-modal')">Schließen</button>
      <button class="btn btn-primary btn-sm" onclick="editFromDetail()">Bearbeiten</button>
    </div>
    <div class="mactions" id="d-user-act" style="display:none">
      <button class="btn btn-primary" onclick="closeModal('detail-modal')">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase,ref,set,get,push,remove,onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyBQhF7MnSAJHk4C0f8mzNDHoXOoMh8pNtE",authDomain:"teamplan-f6719.firebaseapp.com",databaseURL:"https://teamplan-f6719-default-rtdb.europe-west1.firebasedatabase.app",projectId:"teamplan-f6719",storageBucket:"teamplan-f6719.firebasestorage.app",messagingSenderId:"119670665952",appId:"1:119670665952:web:9d1827931c2ed4969e9685"};
const db=getDatabase(initializeApp(FB));

let persons=[],orders=[],me=null,view='month',curDate=new Date();
let editId=null,selPersons=[],selColor=COLORS[0],detailOrder=null,pinBuffer='';

const saveSession=u=>localStorage.setItem('pg_s',JSON.stringify({id:u.id,pin:u.pin}));
const clearSession=()=>localStorage.removeItem('pg_s');
const getSession=()=>{try{return JSON.parse(localStorage.getItem('pg_s'))}catch{return null}};

async function init(){
  const snap=await get(ref(db,'persons'));
  if(!snap.exists()) await set(ref(db,'persons'),{p1:{name:'Admin',pin:'0000',isAdmin:true,color:COLORS[0]}});
  onValue(ref(db,'persons'),s=>{
    persons=[];
    if(s.exists()) Object.keys(s.val()).forEach(k=>persons.push({id:k,...s.val()[k]}));
    if(me){const u=persons.find(p=>p.id===me.id);if(u)me=u;renderAll();}
    else tryAutoLogin();
  });
  onValue(ref(db,'orders'),s=>{
    orders=[];
    if(s.exists()) Object.keys(s.val()).forEach(k=>orders.push({id:k,...s.val()[k]}));
    if(me) renderAll();
  });
  document.getElementById('loading').style.display='none';
}

function tryAutoLogin(){
  const s=getSession();
  if(s&&persons.length>0){const u=persons.find(p=>p.id===s.id&&p.pin===s.pin);if(u){loginAs(u);return;}}
  showLoginScreen();
}

function showLoginScreen(){
  document.getElementById('login-screen').style.display='flex';
  showStep('name');
  document.getElementById('name-input').value='';
}

function showStep(step){
  document.getElementById('step-name').style.display=step==='name'?'block':'none';
  document.getElementById('step-pin').style.display=step==='pin'?'block':'none';
  pinBuffer=''; updateDots();
  document.getElementById('pin-error').textContent='';
  document.getElementById('name-error').textContent='';
}

window.goToPin=()=>{
  const name=document.getElementById('name-input').value.trim();
  if(!name){document.getElementById('name-error').textContent='Bitte deinen Namen eingeben';return;}
  const found=persons.find(p=>p.name.toLowerCase()===name.toLowerCase());
  if(!found){document.getElementById('name-error').textContent='Name nicht gefunden – bitte genau wie registriert eingeben';return;}
  const av=document.getElementById('greeting-avatar');
  av.textContent=found.name[0].toUpperCase();
  av.style.background=found.color;
  document.getElementById('greeting-name').textContent=found.name;
  document.getElementById('greeting-name').style.color=found.color;
  document.getElementById('step-pin').dataset.uid=found.id;
  showStep('pin');
};
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.goToPin();});
window.goBackToName=()=>showStep('name');

window.pinPress=d=>{if(pinBuffer.length>=4)return;pinBuffer+=d;updateDots();if(pinBuffer.length===4)setTimeout(tryLogin,180);};
window.pinDelete=()=>{pinBuffer=pinBuffer.slice(0,-1);updateDots();};
window.pinClear=()=>{pinBuffer='';updateDots();};
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);}

function tryLogin(){
  const uid=document.getElementById('step-pin').dataset.uid;
  const user=persons.find(p=>p.id===uid);
  if(!user)return;
  if(pinBuffer===user.pin){loginAs(user);}
  else{
    const el=document.getElementById('pin-error');
    el.textContent='Falscher PIN – nochmal versuchen';
    pinBuffer='';updateDots();
    setTimeout(()=>el.textContent='',2200);
  }
}

function loginAs(user){
  me=user;saveSession(user);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  setupUI();renderAll();
}

window.logout=()=>{
  me=null;clearSession();
  document.getElementById('app').style.display='none';
  showLoginScreen();
};

init().catch(()=>{document.getElementById('loading').innerHTML='<div style="color:#e17055;text-align:center;padding:24px">Verbindung fehlgeschlagen.<br><small>Seite neu laden</small></div>';});

function setupUI(){
  const dot=document.getElementById('user-dot');
  dot.textContent=me.name[0].toUpperCase();dot.style.background=me.color;
  document.getElementById('user-name-label').textContent=me.name;
  document.getElementById('admin-tag').style.display=me.isAdmin?'inline':'none';
  document.getElementById('add-btn').style.display=me.isAdmin?'inline-block':'none';
  document.getElementById('btn-admin').style.display=me.isAdmin?'inline-block':'none';
}

window.setView=v=>{
  view=v;
  ['month','week','admin'].forEach(x=>{const el=document.getElementById('btn-'+x);if(el)el.classList.toggle('active',x===v);});
  document.getElementById('nav-arrows').style.display=v==='admin'?'none':'flex';
  document.getElementById('cal-wrap').style.display=v==='admin'?'none':'block';
  document.getElementById('admin-panel').style.display=v==='admin'?'block':'none';
  document.getElementById('legend').style.display=v==='admin'?'none':'flex';
  renderAll();
};

function renderAll(){renderLegend();if(view==='month')renderMonth();else if(view==='week')renderWeek();else renderAdmin();}

function renderLegend(){
  const list=me.isAdmin?persons:persons.filter(p=>p.id===me.id);
  document.getElementById('legend').innerHTML=list.map(p=>`<div class="legend-item"><div class="legend-dot" style="background:${p.color}"></div>${p.name}</div>`).join('');
}

// Zeitanzeige formatieren: Von–Bis
function fmtTime(o){
  if(!o.timeStart&&!o.time) return '';
  const s=o.timeStart||o.time;
  if(!o.timeEnd) return s+' Uhr';
  return s+' – '+o.timeEnd+' Uhr';
}

function renderMonth(){
  const y=curDate.getFullYear(),m=curDate.getMonth();
  document.getElementById('nav-label').textContent=new Date(y,m,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  let h='<div class="month-grid">'+['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="mh">${d}</div>`).join('');
  const first=new Date(y,m,1),dow=(first.getDay()+6)%7,dim=new Date(y,m+1,0).getDate(),td=new Date();
  for(let i=0;i<dow;i++)h+=mday(new Date(y,m,1-dow+i),true);
  for(let d=1;d<=dim;d++)h+=mday(new Date(y,m,d),false,new Date(y,m,d).toDateString()===td.toDateString());
  const rem=(dow+dim)%7===0?0:7-(dow+dim)%7;
  for(let i=1;i<=rem;i++)h+=mday(new Date(y,m+1,i),true);
  document.getElementById('cal-wrap').innerHTML=h+'</div>';
}

function mday(dt,other,isToday=false){
  const ds=dt.toISOString().slice(0,10),ords=dayOrders(ds);
  let chips=ords.slice(0,3).map(o=>{
    const t=o.timeStart||o.time||'';
    return `<div class="chip" style="background:${orderColor(o)}" onclick="event.stopPropagation();openDetail('${o.id}')">${t?t+' ':''}${o.title}</div>`;
  }).join('');
  if(ords.length>3)chips+=`<div style="font-size:9px;color:var(--muted);padding:1px 4px">+${ords.length-3}</div>`;
  const cl=me.isAdmin?`onclick="openAddOnDay('${ds}')"`:'';
  return `<div class="mday${other?' other':''}${isToday?' today':''}" ${cl}><div class="dnum">${dt.getDate()}</div><div class="dchips">${chips}</div></div>`;
}

function renderWeek(){
  const mon=monday(curDate),sun=new Date(mon);sun.setDate(sun.getDate()+6);
  document.getElementById('nav-label').textContent=mon.toLocaleDateString('de-DE',{day:'2-digit',month:'short'})+' – '+sun.toLocaleDateString('de-DE',{day:'2-digit',month:'short'});
  const td=new Date(),days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  let h='<div class="week-grid"><div></div>';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach((n,i)=>{const iT=days[i].toDateString()===td.toDateString();h+=`<div class="wdh${iT?' today':''}"><div class="wdn">${n}</div><div class="wdd">${days[i].getDate()}</div></div>`;});
  h+='<div class="timecol">';
  for(let hr=6;hr<22;hr++)h+=`<div class="tslot"><span class="tlabel">${String(hr).padStart(2,'0')}</span></div>`;
  h+='</div>';
  days.forEach(d=>{
    const ds=d.toISOString().slice(0,10),ords=dayOrders(ds);
    const cl=me.isAdmin?`onclick="openAddOnDay('${ds}')"`:'';
    h+=`<div class="wcol" ${cl}>`;
    for(let hr=6;hr<22;hr++)h+='<div class="whl"></div>';
    ords.forEach(o=>{
      const startStr=o.timeStart||o.time||'08:00';
      const endStr=o.timeEnd||null;
      const [hs,ms]=startStr.split(':').map(Number);
      if(hs<6||hs>=22)return;
      const topPx=(hs-6)*56+(ms/60)*56;
      let heightPx=56; // default 1h
      if(endStr){const [he,me2]=endStr.split(':').map(Number);const dur=(he*60+me2)-(hs*60+ms);if(dur>0)heightPx=Math.max(28,(dur/60)*56);}
      h+=`<div class="wev" style="top:${topPx}px;height:${heightPx}px;background:${orderColor(o)}" onclick="event.stopPropagation();openDetail('${o.id}')">
        <div style="font-weight:700">${startStr}${endStr?' – '+endStr:''}</div>
        <div style="opacity:.9;margin-top:1px">${o.title}</div>
      </div>`;
    });
    h+='</div>';
  });
  document.getElementById('cal-wrap').innerHTML=h+'</div>';
}

function renderAdmin(){
  let h=`<div class="ptitle">Team-Mitglieder</div><div class="plist">`;
  persons.forEach(p=>{
    h+=`<div class="prow"><div class="prow-l">
      <div class="pswatch" style="background:${p.color}">${p.name[0].toUpperCase()}</div>
      <div><div class="pname">${p.name}${p.isAdmin?' <span style="font-size:10px;color:var(--accent)">(Admin)</span>':''}</div><div class="ppin">PIN: ${p.pin}</div></div>
    </div>${!p.isAdmin?`<button class="btn btn-ghost btn-sm" onclick="removePerson('${p.id}')">Entfernen</button>`:''}</div>`;
  });
  h+=`</div><div class="ptitle">Neue Person</div>
  <div class="frow" style="max-width:480px;margin-bottom:10px">
    <div class="fg"><label class="flabel">Name</label><input class="finput" id="new-name" placeholder="Vorname Nachname"></div>
    <div class="fg"><label class="flabel">PIN (4 Ziffern)</label><input class="finput" id="new-pin" placeholder="z.B. 1234" maxlength="4" inputmode="numeric"></div>
  </div>
  <div class="fg" style="max-width:480px;margin-bottom:16px"><label class="flabel">Farbe wählen</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="cpicker">${COLORS.map(c=>`<div class="copt" data-c="${c}" onclick="selCol(this)" style="background:${c}"></div>`).join('')}</div>
  </div>
  <button class="btn btn-primary" onclick="addPerson()">Person hinzufügen</button>`;
  document.getElementById('admin-panel').innerHTML=h;
  setTimeout(()=>{const f=document.querySelector('.copt');if(f){f.classList.add('sel');selColor=f.dataset.c;}},40);
}

window.selCol=el=>{document.querySelectorAll('.copt').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');selColor=el.dataset.c;};
window.addPerson=async()=>{
  const name=document.getElementById('new-name').value.trim(),p=document.getElementById('new-pin').value.trim();
  if(!name||p.length!==4){showToast('Bitte Name und 4-stelligen PIN eingeben');return;}
  if(persons.find(x=>x.pin===p)){showToast('Dieser PIN ist bereits vergeben');return;}
  await set(push(ref(db,'persons')),{name,pin:p,isAdmin:false,color:selColor});
  showToast(name+' hinzugefügt ✓');
  document.getElementById('new-name').value='';document.getElementById('new-pin').value='';
};
window.removePerson=async id=>{
  if(!confirm('Person wirklich entfernen?'))return;
  await remove(ref(db,'persons/'+id));
  for(const o of orders){if(o.persons?.includes(id))await set(ref(db,'orders/'+o.id+'/persons'),o.persons.filter(x=>x!==id));}
  showToast('Person entfernt');
};

function dayOrders(ds){return orders.filter(o=>o.date===ds&&(me.isAdmin||o.persons?.includes(me.id)));}
function orderColor(o){const p=persons.find(x=>x.id===o.persons?.[0]);return p?.color||'#555';}
function monday(d){const dt=new Date(d);dt.setDate(dt.getDate()-(dt.getDay()+6)%7);return dt;}

window.openAddModal=(date='',oid=null)=>{
  editId=oid;selPersons=[];
  document.getElementById('modal-title').textContent=oid?'Auftrag bearbeiten':'Neuer Auftrag';
  document.getElementById('delete-btn').style.display=oid?'inline-block':'none';
  if(oid){
    const o=orders.find(x=>x.id===oid);
    document.getElementById('f-title').value=o.title;
    document.getElementById('f-date').value=o.date;
    document.getElementById('f-time-start').value=o.timeStart||o.time||'';
    document.getElementById('f-time-end').value=o.timeEnd||'';
    document.getElementById('f-address').value=o.address||'';
    document.getElementById('f-notes').value=o.notes||'';
    selPersons=o.persons?[...o.persons]:[];
  } else {
    ['f-title','f-address','f-notes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-date').value=date;
    document.getElementById('f-time-start').value='';
    document.getElementById('f-time-end').value='';
  }
  renderPchecks();document.getElementById('add-modal').classList.add('open');
};
window.openAddOnDay=ds=>window.openAddModal(ds);

function renderPchecks(){
  const w=document.getElementById('pchecks');w.innerHTML='';
  persons.filter(p=>!p.isAdmin).forEach(p=>{
    const d=document.createElement('div');
    d.className='pcheck'+(selPersons.includes(p.id)?' sel':'');
    d.innerHTML=`<div class="pdot" style="background:${p.color}"></div>${p.name}`;
    d.onclick=()=>{selPersons=selPersons.includes(p.id)?selPersons.filter(x=>x!==p.id):[...selPersons,p.id];renderPchecks();};
    w.appendChild(d);
  });
}

window.saveOrder=async()=>{
  const title=document.getElementById('f-title').value.trim(),date=document.getElementById('f-date').value;
  if(!title||!date){showToast('Bitte Titel und Datum eingeben');return;}
  const o={
    title,date,
    timeStart:document.getElementById('f-time-start').value,
    timeEnd:document.getElementById('f-time-end').value,
    // Rückwärtskompatibilität
    time:document.getElementById('f-time-start').value,
    address:document.getElementById('f-address').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    persons:[...selPersons]
  };
  if(editId)await set(ref(db,'orders/'+editId),{...o,id:editId});else await set(push(ref(db,'orders')),o);
  closeModal('add-modal');showToast('Auftrag gespeichert ✓');
};
window.deleteOrder=async()=>{if(!confirm('Auftrag wirklich löschen?'))return;await remove(ref(db,'orders/'+editId));closeModal('add-modal');showToast('Auftrag gelöscht');};

window.openDetail=id=>{
  const o=orders.find(x=>x.id===id);if(!o)return;
  detailOrder=o;
  document.getElementById('d-title').textContent=o.title;
  // Von–Bis Zeitanzeige
  const t=fmtTime(o);
  document.getElementById('d-time').textContent=o.date+(t?' · '+t:'');
  document.getElementById('d-addr').textContent=o.address||'—';
  document.getElementById('d-addr-sec').style.display=o.address?'block':'none';
  document.getElementById('d-notes').textContent=o.notes||'—';
  document.getElementById('d-notes-sec').style.display=o.notes?'block':'none';
  const pills=document.getElementById('d-pills');pills.innerHTML='';
  if(!o.persons?.length)pills.innerHTML='<span style="color:var(--muted);font-size:13px">Niemand zugewiesen</span>';
  else o.persons.forEach(pid=>{const p=persons.find(x=>x.id===pid);if(!p)return;pills.innerHTML+=`<div class="apill"><div class="pdot" style="background:${p.color}"></div>${p.name}</div>`;});
  document.getElementById('d-admin-act').style.display=me.isAdmin?'flex':'none';
  document.getElementById('d-user-act').style.display=me.isAdmin?'none':'flex';
  document.getElementById('detail-modal').dataset.oid=id;
  document.getElementById('detail-modal').classList.add('open');
};
window.editFromDetail=()=>{const id=document.getElementById('detail-modal').dataset.oid;closeModal('detail-modal');window.openAddModal('',id);};

window.exportToCalendar=()=>{
  const o=detailOrder;if(!o)return;
  const [y,mo,d]=o.date.split('-');
  const startStr=o.timeStart||o.time||'09:00';
  const endStr=o.timeEnd||null;
  const [hs,ms]=startStr.split(':');
  const pad=n=>String(n).padStart(2,'0');
  let dtEnd;
  if(endStr){const [he,me2]=endStr.split(':');dtEnd=y+mo+d+'T'+pad(he)+pad(me2)+'00';}
  else{dtEnd=y+mo+d+'T'+pad(parseInt(hs)+1)+pad(ms)+'00';}
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//pG Plan//DE','BEGIN:VEVENT',
    'DTSTART:'+y+mo+d+'T'+pad(hs)+pad(ms)+'00',
    'DTEND:'+dtEnd,
    'SUMMARY:'+o.title,
    o.address?'LOCATION:'+o.address.replace(/,/g,'\\,'):null,
    o.notes?'DESCRIPTION:'+o.notes.replace(/\n/g,'\\n'):null,
    'UID:'+o.id+'@pgplan','END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=(o.title||'termin')+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Kalender-Datei gespeichert ✓');
};

window.closeModal=id=>document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
window.navPrev=()=>{if(view==='month')curDate.setMonth(curDate.getMonth()-1);else curDate.setDate(curDate.getDate()-7);renderAll();};
window.navNext=()=>{if(view==='month')curDate.setMonth(curDate.getMonth()+1);else curDate.setDate(curDate.getDate()+7);renderAll();};
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
